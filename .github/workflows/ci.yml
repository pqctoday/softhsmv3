name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (Ubuntu 24.04 / OpenSSL 3.3)
    runs-on: ubuntu-24.04
    env:
      PKG_CONFIG_PATH: /opt/openssl-3.6/lib64/pkgconfig:/opt/openssl-3.6/lib/pkgconfig
      LD_LIBRARY_PATH: /opt/openssl-3.6/lib64:/opt/openssl-3.6/lib

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake g++ pkg-config \
            libcppunit-dev

      - name: Cache OpenSSL 3.6
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /opt/openssl-3.6
          key: ${{ runner.os }}-openssl-3.6-master-v1

      - name: Build and Install OpenSSL 3.6
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/openssl-3.6
          sudo chown -R $USER:$USER /opt/openssl-3.6
          git clone --depth 1 https://github.com/openssl/openssl.git
          cd openssl
          ./config --prefix=/opt/openssl-3.6 --openssldir=/opt/openssl-3.6/ssl shared
          make -j$(nproc)
          make install

      - name: Verify OpenSSL version
        run: /opt/openssl-3.6/bin/openssl version

      - name: CMake configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DOPENSSL_ROOT_DIR=/opt/openssl-3.6

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure

  coverage:
    name: Coverage (Ubuntu 24.04 / OpenSSL 3.3)
    runs-on: ubuntu-24.04
    env:
      PKG_CONFIG_PATH: /opt/openssl-3.6/lib64/pkgconfig:/opt/openssl-3.6/lib/pkgconfig
      LD_LIBRARY_PATH: /opt/openssl-3.6/lib64:/opt/openssl-3.6/lib
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake g++ pkg-config \
            libcppunit-dev \
            lcov

      - name: Cache OpenSSL 3.6
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /opt/openssl-3.6
          key: ${{ runner.os }}-openssl-3.6-master-v1

      - name: Build and Install OpenSSL 3.6
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/openssl-3.6
          sudo chown -R $USER:$USER /opt/openssl-3.6
          git clone --depth 1 https://github.com/openssl/openssl.git
          cd openssl
          ./config --prefix=/opt/openssl-3.6 --openssldir=/opt/openssl-3.6/ssl shared
          make -j$(nproc)
          make install

      - name: CMake configure (with gcov)
        run: |
          cmake -B build-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DOPENSSL_ROOT_DIR=/opt/openssl-3.6 \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build-cov -j$(nproc)

      - name: Test
        run: cd build-cov && ctest --output-on-failure

      - name: Capture coverage
        run: |
          lcov --capture \
            --directory build-cov \
            --output-file coverage.info \
            --ignore-errors empty,mismatch || true
          lcov --remove coverage.info \
            '/usr/*' \
            '*/tests/*' \
            '*/deps/*' \
            '*/CppUnit*' \
            --ignore-errors empty,mismatch \
            --output-file coverage.info || true
          lcov --list coverage.info || true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Check for deprecated OpenSSL API usage
        run: |
          echo "=== Scanning for removed/deprecated OpenSSL 1.x APIs ==="
          DEPRECATED=(
            "RSA_private_encrypt"
            "RSA_public_decrypt"
            "RSA_blinding_on"
            "RSA_blinding_off"
            "RSA_generate_key_ex"
            "ECDSA_do_sign"
            "ECDSA_do_verify"
            "ECDH_compute_key"
            "EC_KEY_new"
            "EC_KEY_free"
            "EC_KEY_set_group"
            "EC_KEY_get0_public_key"
            "EVP_PKEY_set1_RSA"
            "EVP_PKEY_set1_EC_KEY"
            "EVP_PKEY_get1_RSA"
            "EVP_PKEY_get1_EC_KEY"
            "ENGINE_by_id"
            "RSA_set_method"
            "ECDSA_set_method"
            "OpenSSL_add_all_algorithms"
          )
          FOUND=0
          for sym in "${DEPRECATED[@]}"; do
            hits=$(grep -rn "$sym" src/lib/crypto/ --include="*.cpp" --include="*.h" || true)
            if [ -n "$hits" ]; then
              echo "DEPRECATED API FOUND: $sym"
              echo "$hits"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "ERROR: Deprecated API usage detected. Fix before merging."
            exit 1
          else
            echo "OK: No deprecated OpenSSL API usage found."
          fi
